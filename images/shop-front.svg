<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Building -->
  <rect x="50" y="100" width="300" height="150" fill="#8B7355" stroke="#000" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="50,100 200,20 350,100" fill="#A0522D" stroke="#000" stroke-width="2"/>
  
  <!-- Door -->
  <rect x="170" y="180" width="60" height="70" fill="#654321" stroke="#000" stroke-width="2"/>
  <circle cx="225" cy="215" r="3" fill="#FFD700"/>
  
  <!-- Left Window -->
  <rect x="80" y="130" width="50" height="40" fill="#87CEEB" stroke="#000" stroke-width="2"/>
  <line x1="105" y1="130" x2="105" y2="170" stroke="#000" stroke-width="1"/>
  <line x1="80" y1="150" x2="130" y2="150" stroke="#000" stroke-width="1"/>
  
  <!-- Right Window -->
  <rect x="270" y="130" width="50" height="40" fill="#87CEEB" stroke="#000" stroke-width="2"/>
  <line x1="295" y1="130" x2="295" y2="170" stroke="#000" stroke-width="1"/>
  <line x1="270" y1="150" x2="320" y2="150" stroke="#000" stroke-width="1"/>
  
  <!-- Sign -->
  <rect x="140" y="60" width="120" height="30" fill="#FFD700" stroke="#000" stroke-width="2" rx="5"/>
  <text x="200" y="80" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">TEA STALL</text>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#90EE90"/>
  
  <!-- Grass -->
  <circle cx="60" cy="260" r="3" fill="#228B22"/>
  <circle cx="100" cy="265" r="3" fill="#228B22"/>
  <circle cx="140" cy="260" r="3" fill="#228B22"/>
  <circle cx="320" cy="265" r="3" fill="#228B22"/>
  <circle cx="360" cy="260" r="3" fill="#228B22"/>
</svg>