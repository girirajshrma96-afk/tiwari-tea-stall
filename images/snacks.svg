<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF8DC"/>
  
  <!-- Shelf 1 -->
  <rect x="30" y="80" width="340" height="15" fill="#8B4513" stroke="#000" stroke-width="2"/>
  
  <!-- Shelf 2 -->
  <rect x="30" y="150" width="340" height="15" fill="#8B4513" stroke="#000" stroke-width="2"/>
  
  <!-- Shelf 3 -->
  <rect x="30" y="220" width="340" height="15" fill="#8B4513" stroke="#000" stroke-width="2"/>
  
  <!-- Chips Packets Shelf 1 -->
  <rect x="50" y="40" width="30" height="40" fill="#FF6347" stroke="#000" stroke-width="1"/>
  <text x="65" y="65" font-size="12" text-anchor="middle" fill="#FFF">Chips</text>
  
  <rect x="90" y="40" width="30" height="40" fill="#FFD700" stroke="#000" stroke-width="1"/>
  <text x="105" y="65" font-size="12" text-anchor="middle" fill="#000">Chips</text>
  
  <rect x="130" y="40" width="30" height="40" fill="#FF8C00" stroke="#000" stroke-width="1"/>
  <text x="145" y="65" font-size="12" text-anchor="middle" fill="#FFF">Chips</text>
  
  <!-- Biscuits Shelf 2 -->
  <rect x="50" y="110" width="35" height="40" fill="#D2691E" stroke="#000" stroke-width="1"/>
  <text x="67" y="138" font-size="11" text-anchor="middle" fill="#FFF">Biscuits</text>
  
  <rect x="100" y="110" width="35" height="40" fill="#CD853F" stroke="#000" stroke-width="1"/>
  <text x="117" y="138" font-size="11" text-anchor="middle" fill="#FFF">Biscuits</text>
  
  <rect x="150" y="110" width="35" height="40" fill="#DEB887" stroke="#000" stroke-width="1"/>
  <text x="167" y="138" font-size="11" text-anchor="middle" fill="#000">Biscuits</text>
  
  <!-- Chocolates & Candies Shelf 3 -->
  <rect x="50" y="180" width="30" height="40" fill="#8B4513" stroke="#000" stroke-width="1"/>
  <text x="65" y="208" font-size="10" text-anchor="middle" fill="#FFD700">Choco</text>
  
  <rect x="90" y="180" width="30" height="40" fill="#DC143C" stroke="#000" stroke-width="1"/>
  <text x="105" y="208" font-size="10" text-anchor="middle" fill="#FFF">Candy</text>
  
  <!-- Bottles on Shelf 1 Right -->
  <ellipse cx="260" cy="70" rx="15" ry="25" fill="#FF6347" stroke="#000" stroke-width="1"/>
  <ellipse cx="260" cy="45" rx="12" ry="8" fill="#8B0000" stroke="#000" stroke-width="1"/>
  <text x="260" y="75" font-size="12" text-anchor="middle" fill="#FFF">Drink</text>
  
  <ellipse cx="310" cy="70" rx="15" ry="25" fill="#FFD700" stroke="#000" stroke-width="1"/>
  <ellipse cx="310" cy="45" rx="12" ry="8" fill="#FF8C00" stroke="#000" stroke-width="1"/>
  <text x="310" y="75" font-size="12" text-anchor="middle" fill="#000">Drink</text>
  
  <!-- Maggi Box Shelf 2 -->
  <rect x="240" y="120" width="40" height="35" fill="#FF6347" stroke="#000" stroke-width="1"/>
  <text x="260" y="145" font-size="11" text-anchor="middle" fill="#FFD700">Maggi</text>
  
  <rect x="295" y="120" width="40" height="35" fill="#FFD700" stroke="#000" stroke-width="1"/>
  <text x="315" y="145" font-size="11" text-anchor="middle" fill="#000">Maggi</text>
</svg>